services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: microwaveapp-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123"
    ports:
      - "1433:1433"
    volumes:
      - microwaveapp-sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/MicrowaveApp.Api/Dockerfile
    container_name: microwaveapp-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnectionEncrypted: "pnqyUCjlQnPTX3AgsPFHqF+YB+Rqxej/b8SP0TBrz4Oo9M2/aJ5WVzaCVkaoIacI/iMITchB7yo6vk9Cdcs90uVQZ8Ee2QMdyUnIaKOvZb9wQH3+vxop9R0hTw3Jaj9Qq+9Hh5PDb2lQ15qMQSAXP2wTe40HiAOYrCBFDo0LZmE="
      Security__ConnectionStringKey: "MicrowaveApp-Level4-Development-Key-2026"
      Jwt__Issuer: "MicrowaveApp.Api"
      Jwt__Audience: "MicrowaveApp.Blazor"
      Jwt__Key: "MicrowaveApp-Level4-Jwt-Key-Change-In-Production-2026"
      Jwt__ExpirationMinutes: "120"
    ports:
      - "5167:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

  blazor:
    build:
      context: .
      dockerfile: src/MicrowaveApp.Blazor/Dockerfile
    container_name: microwaveapp-blazor
    ports:
      - "5174:80"
    depends_on:
      - api

volumes:
  microwaveapp-sqlserver-data:
