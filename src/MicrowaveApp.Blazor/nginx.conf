server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Blazor framework files têm hash no nome — pode cachear por tempo longo
    location ~* \.(dll|wasm|dat|blat)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # CSS e JS sem hash — nunca cachear para refletir deploys imediatamente
    location ~* \.(css|js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
